<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Shiva Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">Contact Me</h1>

<p class="text-center">
If you would like to contact me, please fill out the form below.
</p>

<p class="text-center">
Email: shiva.shrestha24@my.northampton.ac.uk <br>
Location: Northampton, UK
</p>

<div class="row justify-content-center mt-4">

<div class="col-md-6">

<div class="card p-4 shadow">

<form action="mailto:shiva.shrestha24@my.northampton.ac.uk" method="post" enctype="text/plain">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="4" placeholder="Write your message" required></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn btn-primary">Send Message</button>
</div>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
